spring:
  application:
    name: wlb-ledger-engine

  datasource:
    # ? ???? 1?????? (?????? 3306 Port ? chronicle_wlb_db ???)
    url: jdbc:mysql://localhost:3306/chronicle_wlb_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Taipei

    # ? ???? 2???????? (AppServ ????? root)
    username: root

    # ? ???? 3???????? (AppServ ?????????????????????)
    password: ${DB_PASSWORD:1234}

    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # ? IntelliJ ?????? SQL ??????????????????
    show-sql: true
    hibernate:
      # validate ?????????? Java ?? Entity ???? MySQL ? 7 ????
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

# JWT configuration — secret is loaded from env var JWT_SECRET in production.
# The secret must be at least 32 characters (256-bit) for HS256 signing.
jwt:
  secret: ${JWT_SECRET:chronicle-wlb-super-secret-key-for-dev-only-32ch}
  expiration-ms: 86400000   # 24 hours in milliseconds